# ─── Create preview theme for every Pull Request ────────────────────────────
name: PR Preview Theme

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  preview:
    name: Create PR Preview Theme
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli@latest

      - name: Push preview theme
        id: push_preview
        run: |
          # Shopify theme names cannot contain slashes, so replace them with
          # dashes (branch names like `devin/123-foo` would otherwise break).
          RAW_NAME="PR-${{ github.event.pull_request.number }}-${{ github.head_ref }}"
          THEME_NAME="${RAW_NAME//\//-}"
          # Truncate to Shopify's 50 char limit
          THEME_NAME="${THEME_NAME:0:50}"
          echo "THEME_NAME=$THEME_NAME" >> "$GITHUB_ENV"

          # Run push without `set -e` aborting before we can print the output.
          set +e
          shopify theme push \
            --store="${{ secrets.SHOPIFY_STORE_URL }}" \
            --theme="$THEME_NAME" \
            --json \
            --unpublished > /tmp/push_output.txt 2>&1
          STATUS=$?
          set -e

          echo "=== shopify theme push output (exit=$STATUS) ==="
          cat /tmp/push_output.txt
          echo "=== end of shopify output ==="

          if [ $STATUS -ne 0 ]; then
            echo "❌ shopify theme push failed with exit code $STATUS"
            exit $STATUS
          fi

          # Extract preview URL from the last JSON object in the captured output.
          PREVIEW_URL=$(python3 -c 'import re,sys; s=open("/tmp/push_output.txt").read(); m=re.findall(r"\"preview_url\":\"([^\"]+)\"", s); print(m[-1] if m else "")')

          if [ -z "$PREVIEW_URL" ]; then
            echo "❌ Could not extract preview URL from Shopify CLI output"
            exit 1
          fi

          echo "PREVIEW_URL=$PREVIEW_URL" >> "$GITHUB_ENV"
        env:
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const previewUrl = process.env.PREVIEW_URL;
            const themeName  = process.env.THEME_NAME;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo:  context.repo.repo,
              body: `## 🎨 Theme Preview Ready\n\n**Theme name:** \`${themeName}\`\n\n👀 [**Preview this PR on your store →**](${previewUrl})\n\n> This preview theme will be deleted when the PR is closed.`
            });

  cleanup:
    name: Delete PR Preview Theme
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli@latest

      - name: Delete preview theme
        run: |
          RAW_NAME="PR-${{ github.event.pull_request.number }}-${{ github.head_ref }}"
          THEME_NAME="${RAW_NAME//\//-}"
          THEME_NAME="${THEME_NAME:0:50}"

          THEME_ID=$(shopify theme list \
            --store="${{ secrets.SHOPIFY_STORE_URL }}" \
            --json | python3 -c 'import json,sys; themes=json.load(sys.stdin); match=next((str(t.get("id")) for t in themes if t.get("name")==sys.argv[1]), ""); print(match)' "$THEME_NAME")

          if [ -n "$THEME_ID" ]; then
            shopify theme delete \
              --store="${{ secrets.SHOPIFY_STORE_URL }}" \
              --theme="$THEME_ID" \
              --force
            echo "🗑 Deleted preview theme: $THEME_NAME"
          else
            echo "ℹ️ No preview theme found for: $THEME_NAME"
          fi
        env:
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}
